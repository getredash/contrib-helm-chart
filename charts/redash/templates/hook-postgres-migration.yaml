{{- if and .Values.postgresql.enabled .Values.postgresqlMigration.enabled }}
{{- $postgresqlFullname := include "redash.postgresql.fullname" . }}
apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ .Release.Name }}-postgres-migration"
  labels:
    {{- include "redash.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres-migration
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      name: "{{ .Release.Name }}-postgres-migration"
      labels:
        {{- include "redash.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres-migration
    spec:
      serviceAccountName: {{ include "redash.serviceAccountName" . }}
      restartPolicy: Never
      containers:
      - name: postgres-dump
        image: postgres:15-alpine
        command:
          - /bin/sh
          - -c
          - |
            set -e
            echo "=== PostgreSQL Migration Pre-Upgrade Hook ==="

            # Install kubectl
            apk add --no-cache curl > /dev/null 2>&1
            KUBECTL_VERSION="v1.30.0"
            curl -LO "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl" > /dev/null 2>&1
            chmod +x kubectl && mv kubectl /usr/local/bin/kubectl > /dev/null 2>&1 || true

            RELEASE_NAME="{{ .Release.Name }}"
            NAMESPACE="{{ .Release.Namespace }}"
            OLD_PG_HOST="{{ $postgresqlFullname }}"
            OLD_PG_USER="{{ .Values.postgresql.auth.username }}"
            OLD_PG_DB="{{ .Values.postgresql.auth.database }}"

            # Step 1: Wait for old PostgreSQL to be ready, then dump
            echo "Step 1/5: Waiting for PostgreSQL and creating database dump..."
            until PGPASSWORD="$PGPASSWORD" psql -h "$OLD_PG_HOST" -U "$OLD_PG_USER" -d "$OLD_PG_DB" -c "SELECT 1;" > /dev/null 2>&1; do
              echo "Waiting for PostgreSQL to be ready..."
              sleep 2
            done

            PG_VERSION=$(PGPASSWORD="$PGPASSWORD" psql -h "$OLD_PG_HOST" -U "$OLD_PG_USER" -d "$OLD_PG_DB" -t -c "SELECT version();" | grep -oE '[0-9]+\.[0-9]+' | head -1)
            echo "Current PostgreSQL version: $PG_VERSION"

            PGPASSWORD="$PGPASSWORD" pg_dump -h "$OLD_PG_HOST" -U "$OLD_PG_USER" -d "$OLD_PG_DB" -F c -f /tmp/redash-backup.dump
            PGPASSWORD="$PGPASSWORD" pg_dump -h "$OLD_PG_HOST" -U "$OLD_PG_USER" -d "$OLD_PG_DB" -F p > /tmp/redash-backup.sql
            echo "Database dump created successfully"
            ls -lh /tmp/redash-backup.*

            # Step 2: Delete Redash Deployments (label selectors changed between versions)
            echo "Step 2/5: Deleting Redash Deployments..."
            kubectl delete deployments -n "$NAMESPACE" -l "app.kubernetes.io/instance=$RELEASE_NAME" --ignore-not-found
            echo "Deployments deleted."

            # Step 3: Delete PostgreSQL StatefulSet with --cascade=orphan then kill the pod
            echo "Step 3/5: Removing PostgreSQL StatefulSet and pod..."
            MATCHED_STS=""
            for STATEFULSET_NAME in "${RELEASE_NAME}-postgresql" "${RELEASE_NAME}-postgresql-primary"; do
              if kubectl get statefulset "$STATEFULSET_NAME" -n "$NAMESPACE" > /dev/null 2>&1; then
                echo "Found StatefulSet: $STATEFULSET_NAME"
                if kubectl delete statefulset "$STATEFULSET_NAME" -n "$NAMESPACE" --cascade=orphan; then
                  MATCHED_STS="$STATEFULSET_NAME"
                else
                  echo "WARNING: Failed to delete StatefulSet $STATEFULSET_NAME — skipping pod deletion to avoid recreation by active controller."
                fi
                break
              fi
            done

            if [ -n "$MATCHED_STS" ]; then
              kubectl delete pod "${MATCHED_STS}-0" -n "$NAMESPACE" --ignore-not-found
              echo "PostgreSQL pod ${MATCHED_STS}-0 terminated."
            fi

            # Step 4: Delete Redis StatefulSet with --cascade=orphan then kill the pod
            # Redis 19.x → 24.x has immutable spec changes requiring STS recreation
            echo "Step 4/5: Removing Redis StatefulSet and pod..."
            for REDIS_STS in "${RELEASE_NAME}-redis-master" "${RELEASE_NAME}-redis"; do
              if kubectl get statefulset "$REDIS_STS" -n "$NAMESPACE" > /dev/null 2>&1; then
                echo "Found Redis StatefulSet: $REDIS_STS"
                if kubectl delete statefulset "$REDIS_STS" -n "$NAMESPACE" --cascade=orphan; then
                  kubectl delete pod "${REDIS_STS}-0" -n "$NAMESPACE" --ignore-not-found
                  echo "Redis StatefulSet $REDIS_STS and pod removed."
                else
                  echo "WARNING: Failed to delete Redis StatefulSet $REDIS_STS."
                fi
                break
              fi
            done

            # Step 5: Delete the PostgreSQL PVC so new PostgreSQL can start fresh
            echo "Step 5/5: Deleting PostgreSQL PVC (data is safely backed up in dump files)..."
            for PVC_NAME in "data-${RELEASE_NAME}-postgresql-0" "${RELEASE_NAME}-postgresql-data-0" "${RELEASE_NAME}-postgresql-data" "${RELEASE_NAME}-postgresql"; do
              if kubectl get pvc "$PVC_NAME" -n "$NAMESPACE" > /dev/null 2>&1; then
                echo "Found PVC: $PVC_NAME"
                kubectl delete pvc "$PVC_NAME" -n "$NAMESPACE" --timeout=120s || {
                  echo "WARNING: Failed to delete PVC $PVC_NAME. New PostgreSQL may fail to start."
                  echo "You may need to manually delete: kubectl delete pvc $PVC_NAME -n $NAMESPACE"
                }
                break
              fi
            done

            echo "Migration preparation complete!"
            echo "Dump files stored at: /tmp/redash-backup.dump and /tmp/redash-backup.sql"
            echo "The post-upgrade hook will restore the data automatically."
        env:
        - name: PGHOST
          value: {{ $postgresqlFullname }}
        - name: PGPORT
          value: "5432"
        - name: PGUSER
          value: {{ .Values.postgresql.auth.username | quote }}
        - name: PGDATABASE
          value: {{ .Values.postgresql.auth.database | quote }}
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-postgresql
              key: password
        volumeMounts:
        - name: migration-storage
          mountPath: /tmp
      volumes:
      - name: migration-storage
        {{- if .Values.postgresqlMigration.storage.pvcName }}
        persistentVolumeClaim:
          claimName: {{ .Values.postgresqlMigration.storage.pvcName }}
        {{- else }}
        emptyDir: {}
        {{- end }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ .Release.Name }}-postgres-restore"
  labels:
    {{- include "redash.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres-restore
  annotations:
    "helm.sh/hook": post-upgrade
    "helm.sh/hook-weight": "-6"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      name: "{{ .Release.Name }}-postgres-restore"
      labels:
        {{- include "redash.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres-restore
    spec:
      serviceAccountName: {{ include "redash.serviceAccountName" . }}
      restartPolicy: Never
      containers:
      - name: postgres-restore
        image: postgres:18-alpine
        command:
          - /bin/sh
          - -c
          - |
            set -e
            echo "Waiting for PostgreSQL 18 to be ready..."

            NEW_PG_HOST="{{ $postgresqlFullname }}"
            NEW_PG_USER="{{ .Values.postgresql.auth.username }}"
            NEW_PG_DB="{{ .Values.postgresql.auth.database }}"

            MAX_WAIT=300
            WAITED=0
            until PGPASSWORD="$PGPASSWORD" psql -h "$NEW_PG_HOST" -U "$NEW_PG_USER" -d "$NEW_PG_DB" -c "SELECT 1;" > /dev/null 2>&1; do
              if [ $WAITED -ge $MAX_WAIT ]; then
                echo "ERROR: PostgreSQL 18 did not become ready within $MAX_WAIT seconds"
                exit 1
              fi
              echo "Waiting for PostgreSQL 18 to be ready... ($WAITED/$MAX_WAIT seconds)"
              sleep 5
              WAITED=$((WAITED + 5))
            done

            echo "PostgreSQL 18 is ready. Checking for dump files and database state..."

            HAS_REDASH_DATA=$(PGPASSWORD="$PGPASSWORD" psql -h "$NEW_PG_HOST" -U "$NEW_PG_USER" -d "$NEW_PG_DB" -t -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'public' AND table_name = 'alembic_version';" 2>/dev/null | tr -d ' ' || echo "0")
            TABLE_COUNT=$(PGPASSWORD="$PGPASSWORD" psql -h "$NEW_PG_HOST" -U "$NEW_PG_USER" -d "$NEW_PG_DB" -t -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'public';" 2>/dev/null | tr -d ' ' || echo "0")

            if [ -f /tmp/redash-backup.dump ] || [ -f /tmp/redash-backup.sql ]; then
              if [ "$HAS_REDASH_DATA" = "0" ] && [ "$TABLE_COUNT" = "0" ]; then
                echo "Database is empty. Restoring from dump file..."

                if [ -f /tmp/redash-backup.dump ]; then
                  echo "Restoring from custom dump format..."
                  PGPASSWORD="$PGPASSWORD" pg_restore -h "$NEW_PG_HOST" -U "$NEW_PG_USER" -d "$NEW_PG_DB" -v --no-owner --no-privileges /tmp/redash-backup.dump || {
                    echo "pg_restore failed, trying SQL restore..."
                    if [ -f /tmp/redash-backup.sql ]; then
                      PGPASSWORD="$PGPASSWORD" psql -h "$NEW_PG_HOST" -U "$NEW_PG_USER" -d "$NEW_PG_DB" < /tmp/redash-backup.sql
                    else
                      echo "ERROR: SQL dump file not found"
                      exit 1
                    fi
                  }
                elif [ -f /tmp/redash-backup.sql ]; then
                  echo "Restoring from SQL dump file..."
                  PGPASSWORD="$PGPASSWORD" psql -h "$NEW_PG_HOST" -U "$NEW_PG_USER" -d "$NEW_PG_DB" < /tmp/redash-backup.sql
                fi

                echo "Database restore completed successfully"
                echo "Cleaning up dump files to prevent re-restoration..."
                rm -f /tmp/redash-backup.dump /tmp/redash-backup.sql
                echo "Dump files cleaned up."
              else
                echo "Database already contains data (found $TABLE_COUNT tables, Redash data: $HAS_REDASH_DATA)."
                echo "Skipping restore - migration has already been completed."
                rm -f /tmp/redash-backup.dump /tmp/redash-backup.sql
              fi
            else
              if [ "$HAS_REDASH_DATA" = "1" ] || [ "$TABLE_COUNT" -gt 0 ]; then
                echo "Database already contains data. No migration needed."
              else
                echo "WARNING: No dump files found and database is empty."
                echo "This might be expected if:"
                echo "  1. This is a fresh installation"
                echo "  2. Migration storage (PVC) was not configured correctly"
                echo ""
                echo "Skipping restore. Redash schema migrations will run next."
              fi
            fi
        env:
        - name: PGHOST
          value: {{ $postgresqlFullname }}
        - name: PGPORT
          value: "5432"
        - name: PGUSER
          value: {{ .Values.postgresql.auth.username | quote }}
        - name: PGDATABASE
          value: {{ .Values.postgresql.auth.database | quote }}
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-postgresql
              key: password
        volumeMounts:
        - name: migration-storage
          mountPath: /tmp
      volumes:
      - name: migration-storage
        {{- if .Values.postgresqlMigration.storage.pvcName }}
        persistentVolumeClaim:
          claimName: {{ .Values.postgresqlMigration.storage.pvcName }}
        {{- else }}
        emptyDir: {}
        {{- end }}
{{- end }}
